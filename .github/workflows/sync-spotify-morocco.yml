name: Sync Spotify Morocco Chart

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-spotify-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Spotify Morocco data
        run: npm run sync:spotify:morocco

      - name: Commit updated chart data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/spotify-morocco.json
          if git diff --cached --quiet; then
            echo "No chart changes to commit."
            exit 0
          fi
          git commit -m "Update Spotify Morocco chart data"
          git push
