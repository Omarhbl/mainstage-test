name: Sync TMDB Upcoming Releases

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync-tmdb-upcoming:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync TMDB upcoming releases
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: npm run sync:tmdb:upcoming

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/tmdb-upcoming.json
          git diff --cached --quiet || git commit -m "Sync TMDB upcoming releases"
          git push
